title: Functional Programming Lectures
description: >-
  A comprehensive curriculum for mastering functional programming with
  TypeScript and Redux — from pure functions to monads and modern Redux
  architecture.
author:
  name: Sean Dinwiddie
  twitter: seandinwiddie
lang: en
# Canonical GitHub Pages project-site settings. A host or base-path migration
# must update these values together with canonical metadata and validation rules.
url: "https://seandinwiddie.github.io"
baseurl: "/lectures"
theme: minima
logo: /assets/lecture-mark.svg
header_pages:
  - technology-maintenance.md
twitter:
  username: seandinwiddie
  card: summary_large_image
social:
  name: Sean Dinwiddie
  links:
    - https://sdin.dev/
    - https://github.com/seandinwiddie
    - https://www.linkedin.com/in/seandinwiddie/
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
defaults:
  - scope: { path: "" }
    values:
      layout: default
      image:
        path: /assets/functional-programming-lectures-social.png
        width: 1200
        height: 630
        alt: Functional Programming Lectures by Sean Dinwiddie
exclude:
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - node_modules
  - LICENSE
  - README.md
  - .markdownlint.json
  - .markdown-link-check.json
  - .github
  - scripts
